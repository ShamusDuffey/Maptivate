<!DOCTYPE html>
<html>
<head>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(45deg, #6a00b8 0%, #9b30d9 60%, #d4a0ff 100%);
    }
    #map {
      float: left;
      position: relative;
      top: 10vh;
      bottom: 10vh;
      right: 5vw;
      width: 55vw;
      height: 80vh;
    }
    #pinCreationModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border: 2px solid black;
      border-radius: 8px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="konsole" style="float:left; width:40vw; height:80vh; position:relative; top:10vh; left:5vw;">
    <ul style="list-style-type: none;">
      <li>
        <input type="button" id="createNewLayer" value="Create layer">
        <input type="text" id="layerNameInput" placeholder="Name the layer based on what it shows.">
      </li>
      <li>
        Which layer slot are you swapping?
      </li>
      <li>
        <select id="layerSwapDropdown">
          <option value="0">Layer 1</option>
          <option value="1">Layer 2</option>
          <option value="2">Layer 3</option>
          <option value="3">Layer 4</option>
        </select>
      </li>
      <li>
        <input type="button" value="SEARCH" id="searchButton">
        <input type="search" placeholder="What data do you want to see mapped?" id="searchBar">
      </li>
      <li>
        <ul id="resultsList" style="list-style-type: none; padding-left: 0; margin-top: 10px;"></ul>
        <br><br><br><br><br><br><br><br>
      </li>
      <li><label><input type="checkbox" id="layer1Box">LAYER 1</label></li>
      <li><label><input type="checkbox" id="layer2Box">LAYER 2</label></li>
      <li><label><input type="checkbox" id="layer3Box">LAYER 3</label></li>
      <li><label><input type="checkbox" id="layer4Box">LAYER 4</label></li>
      <li>
        <input type="button" id="manageSubtypesBtn" value="Manage Subtypes">
      </li>
      <li id="subtypeFormContainer" style="display:none;">
        <select id="subtypeLayerSelect"></select><br>
        <input type="text" id="subtypeNameInput" placeholder="Subtype name (e.g. swings)"><br>
        <input type="text" id="subtypeIconUrlInput" placeholder="Icon URL (optional)"><br>
        <input type="file" id="subtypeIconFileInput" accept="image/*"><br>
        <input type="button" id="saveSubtypeBtn" value="Save Subtype">
        <div id="subtypeList" style="margin-top:8px;"></div>
      </li>
      <li>
        <input type="button" id="signInButton" value="SIGN IN">
      </li>
    </ul>
  </div>
  <div id="map" style="border-radius: 32px; border: 4px solid yellow;"></div>
  <div id="pinDetailModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; overflow-y:auto; padding:20px; box-sizing:border-box;">
    <input type="button" id="closePinDetailBtn" value="Close">
    <h2 id="detailPinTitle"></h2>
    <p id="detailPinContent"></p>
    <p id="detailPinCreator"></p>
    <div id="detailDeleteContainer"></div>
    <div id="detailVoteWidget"></div>
    <div id="detailMap" style="width:55vw; height:70vh; border-radius:32px; border:4px solid yellow; margin-top:20px;"></div>
  </div>
  <div id="pinCreationModal">
    <h3>Tag your pin</h3>
    <div id="subtypeSelectors"></div>
    <input type="button" id="confirmPinBtn" value="Place Pin">
    <input type="button" id="cancelPinBtn" value="Cancel">
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="GITpinColor.js" defer></script>
  <script src="GITsubtypes.js" defer></script>
  <script src="GITvoting.js" defer></script>
  <script src="GITindex.js" defer></script>
</body>
</html>
